name: Apply Native Source Fixes

on:
  push:
    branches:
      - agent/finish-slate-image-editor

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finish-slate-image-editor
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply targeted source repairs
        run: python3 scripts/apply-source-fixes.py
      - name: Format Rust source
        run: cargo fmt --all
      - name: Commit formatted repairs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src
          git diff --cached --quiet && exit 0
          git commit -m 'Fix native build and format source'
          git push origin HEAD:agent/finish-slate-image-editor
