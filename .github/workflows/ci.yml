name: Native CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finish-slate-image-editor
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libvips-dev liblcms2-dev \
            libcairo2-dev libpango1.0-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Apply compiler-driven source repairs
        if: github.actor != 'github-actions[bot]'
        run: python3 scripts/apply-source-fixes.py
      - name: Apply rustfmt in the runner
        run: cargo fmt --all
      - name: Commit repaired source
        if: github.actor != 'github-actions[bot]'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src
          if ! git diff --cached --quiet; then
            git commit -m 'Fix native build and format source'
            git push origin HEAD:agent/finish-slate-image-editor
          fi
      - name: Preserve formatted source
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-source
          path: src
          if-no-files-found: error
      - name: Test
        id: test
        shell: bash
        run: |
          set -o pipefail
          cargo test --all-targets --all-features --locked 2>&1 | tee cargo-test.log
      - name: Clippy
        if: always()
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --all-targets --all-features --locked -- -D warnings 2>&1 | tee cargo-clippy.log
      - name: Preserve native diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-ci-diagnostics
          path: |
            cargo-test.log
            cargo-clippy.log
          if-no-files-found: warn
      - name: Verify committed formatting
        if: always()
        run: git diff --exit-code -- '*.rs'
